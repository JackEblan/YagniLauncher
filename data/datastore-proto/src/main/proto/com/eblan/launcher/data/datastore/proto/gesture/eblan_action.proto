syntax = "proto3";

option java_package = "com.eblan.launcher.data.datastore.proto.gesture";
option java_multiple_files = true;

message EblanActionProto {
  EblanActionTypeProto eblanActionTypeProto = 1;

  int64 serialNumber = 2;

  string componentName = 3;
}

enum EblanActionTypeProto {
  NONE = 0;
  OPEN_APP_DRAWER = 1;
  OPEN_NOTIFICATION_PANEL = 2;
  OPEN_APP = 3;
  LOCK_SCREEN = 4;
  OPEN_QUICK_SETTINGS = 5;
  OPEN_RECENTS = 6;
}