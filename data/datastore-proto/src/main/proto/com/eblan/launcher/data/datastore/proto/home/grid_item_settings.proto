syntax = "proto3";

import "com/eblan/launcher/data/datastore/proto/home/text_color.proto";
import "com/eblan/launcher/data/datastore/proto/home/horizontal_alignment.proto";
import "com/eblan/launcher/data/datastore/proto/home/horizontal_arrangement.proto";
import "com/eblan/launcher/data/datastore/proto/home/vertical_alignment.proto";
import "com/eblan/launcher/data/datastore/proto/home/vertical_arrangement.proto";
import "com/eblan/launcher/data/datastore/proto/home/grid_item_layout_type.proto";

option java_package = "com.eblan.launcher.data.datastore.proto.home";
option java_multiple_files = true;

message GridItemSettingsProto {
  int32 iconSize = 1;
  TextColorProto textColorProto = 2;
  int32 textSize = 3;
  bool showLabel = 4;
  bool singleLineLabel = 5;
  HorizontalAlignmentProto horizontalAlignmentProto = 6;
  VerticalArrangementProto verticalArrangementProto = 7;
  int32 customTextColor = 8;
  int32 customBackgroundColor = 9;
  int32 padding = 10;
  int32 cornerRadius = 11;
  GridItemLayoutTypeProto gridItemLayoutTypeProto = 12;
}